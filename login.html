<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232E7D8A' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M22 12h-4l-3 9L9 3l-3 9H2'/%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Portal Login - ApexPharma</title>
  <meta name="description" content="Access your family medication refills, prescription files, and secure delivery coordinates.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <script defer src="assets/js/main.js"></script>
  <style>
    /* ── Page background ── */
    .auth-page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, rgba(95, 163, 177, 0.18) 0%, rgba(247, 250, 252, 1) 70%);
      padding: 24px;
      position: relative;
    }
    [data-theme="dark"] .auth-page-wrapper {
      background: radial-gradient(circle at 50% 30%, rgba(46, 125, 138, 0.12) 0%, rgba(16, 23, 28, 1) 70%);
    }

    /* ── Floating toolbar (top-right) ── */
    .auth-toolbar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 200;
    }
    [dir="rtl"] .auth-toolbar {
      right: auto;
      left: 20px;
    }
    .auth-toolbar-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 0.78rem;
      font-weight: 600;
      font-family: var(--font-family);
      transition: var(--transition);
      box-shadow: var(--shadow);
    }
    .auth-toolbar-btn:hover {
      background: var(--accent-primary);
      color: #fff;
      border-color: var(--accent-primary);
    }

    /* ── Card ── */
    .auth-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-lg);
      padding: 44px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow-lg);
    }
    [data-theme="dark"] .auth-card {
      background: rgba(24, 35, 43, 0.78);
      border-color: rgba(255, 255, 255, 0.06);
    }

    /* ── Brand ── */
    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--accent-primary);
      margin-bottom: 8px;
      text-decoration: none;
    }
    .auth-heading {
      text-align: center;
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* ── Tabs ── */
    .auth-tab-nav {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 26px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 550;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .auth-tab.active {
      color: var(--accent-primary);
      border-bottom: 2px solid var(--accent-primary);
    }

    /* ── Form fields ── */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 7px;
      font-weight: 550;
      font-size: 0.88rem;
      color: var(--text-primary);
    }
    .form-group input[type="email"],
    .form-group input[type="password"],
    .form-group input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      font-family: var(--font-family);
      font-size: 0.95rem;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(46, 125, 138, 0.1);
    }

    /* ── Password wrapper with eye icon ── */
    .pw-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .pw-wrapper input {
      padding-right: 46px !important;
    }
    .pw-eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.2s;
      line-height: 0;
    }
    [dir="rtl"] .pw-eye-btn {
      right: auto;
      left: 12px;
    }
    [dir="rtl"] .pw-wrapper input {
      padding-right: 14px !important;
      padding-left: 46px !important;
    }
    .pw-eye-btn:hover {
      color: var(--accent-primary);
    }

    /* ── Remember-me + Forgot password row ── */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 8px;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent-primary);
      cursor: pointer;
    }
    .forgot-link {
      font-size: 0.875rem;
      color: var(--accent-primary);
      font-weight: 540;
      text-decoration: none;
      position: relative;
      white-space: nowrap;
    }
    .forgot-link::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: var(--accent-primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .forgot-link:hover::after {
      transform: scaleX(1);
    }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }

    /* ── Social / OAuth buttons ── */
    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }
    .oauth-btn {
      width: 100%;
      padding: 11px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      background-color: var(--bg-card);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 11px;
      font-weight: 520;
      font-size: 0.92rem;
      font-family: var(--font-family);
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
    }
    .oauth-btn:hover {
      background-color: var(--bg-secondary);
      border-color: var(--accent-primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    .oauth-btn svg {
      flex-shrink: 0;
    }

    /* ── Bottom link ── */
    .auth-switch {
      margin-top: 28px;
      text-align: center;
      font-size: 0.92rem;
      color: var(--text-secondary);
    }
    .auth-switch-link {
      color: var(--accent-primary);
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }
    .auth-switch-link::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 1.5px;
      background: var(--accent-primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .auth-switch-link:hover::after {
      transform: scaleX(1);
    }
  </style>
</head>
<body>

  <!-- Floating RTL + Theme Toolbar -->
  <div class="auth-toolbar">
    <!-- RTL Toggle -->
    <button class="auth-toolbar-btn rtl-toggle" title="Toggle RTL / LTR">RTL</button>
    <!-- Dark Mode Toggle -->
    <button class="auth-toolbar-btn theme-toggle" title="Toggle Theme">
      <!-- Moon icon (light mode) -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 8a2.83 2.83 0 0 0 4 4 4 4 0 1 1-4-4"/>
        <path d="M12 2v2"/><path d="M12 20v2"/>
        <path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/>
        <path d="M2 12h2"/><path d="M20 12h2"/>
        <path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/>
      </svg>
    </button>
  </div>

  <div class="auth-page-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <a href="index.html" class="auth-brand">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <span>ApexPharma</span>
      </a>
      <p class="auth-heading">Sign in to your patient account</p>

      <!-- Tabs -->
      <div class="auth-tab-nav">
        <div class="auth-tab active" id="tab-login-btn" onclick="switchAuthTab('pass')">Password</div>
        <div class="auth-tab" id="tab-otp-btn" onclick="switchAuthTab('otp')">OTP / Phone</div>
      </div>

      <!-- Password Login Form -->
      <form id="form-password-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Registered Email</label>
          <input type="email" id="login-email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="pw-wrapper">
            <input type="password" id="login-password" required placeholder="••••••••">
            <button type="button" class="pw-eye-btn" onclick="toggleEye('login-password', this)" aria-label="Toggle password visibility">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me + Forgot password on same line -->
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember-me">
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; padding:13px;">Sign In</button>
      </form>

      <!-- OTP Login Form -->
      <form id="form-otp-login" style="display:none;" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-phone">Mobile Phone Number</label>
          <input type="tel" id="login-phone" placeholder="+1 (555) 019-9000">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; padding:13px;">Send Verification OTP</button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">or continue with</div>

      <!-- Social Buttons -->
      <div class="social-btns">

        <!-- Google -->
        <button class="oauth-btn" onclick="handleThirdParty('Google')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <!-- Facebook -->
        <button class="oauth-btn" onclick="handleThirdParty('Facebook')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047v-2.66c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.265h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
          Continue with Facebook
        </button>

        <!-- Apple -->
        <button class="oauth-btn" onclick="handleThirdParty('Apple')">
          <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="currentColor"/>
          </svg>
          Continue with Apple
        </button>

      </div>

      <!-- Switch to register -->
      <div class="auth-switch">
        New to ApexPharma?
        <a href="register.html" class="auth-switch-link">Create Patient Account</a>
      </div>

    </div>
  </div>

  <script>
    function switchAuthTab(mode) {
      const passForm = document.getElementById('form-password-login');
      const otpForm  = document.getElementById('form-otp-login');
      const passTab  = document.getElementById('tab-login-btn');
      const otpTab   = document.getElementById('tab-otp-btn');

      if (mode === 'pass') {
        passForm.style.display = 'block';
        otpForm.style.display  = 'none';
        passTab.classList.add('active');
        otpTab.classList.remove('active');
      } else {
        passForm.style.display = 'none';
        otpForm.style.display  = 'block';
        passTab.classList.remove('active');
        otpTab.classList.add('active');
      }
    }

    function toggleEye(inputId, btn) {
      const input   = document.getElementById(inputId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeOff  = btn.querySelector('.eye-off');
      if (input.type === 'password') {
        input.type   = 'text';
        eyeOpen.style.display = 'none';
        eyeOff.style.display  = 'inline';
      } else {
        input.type   = 'password';
        eyeOpen.style.display = 'inline';
        eyeOff.style.display  = 'none';
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }

    function handleThirdParty(provider) {
      if (window.showToast) {
        window.showToast(`Simulating secure ${provider} authentication redirect...`);
      }
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    }
  </script>
</body>
</html>
